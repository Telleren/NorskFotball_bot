name: Update FotMob Cache

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/update-cache.yml"
      - "scripts/update_cache.py"
      - "norskfotballbot/config.py"

permissions:
  contents: write

jobs:
  update-cache:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Refresh cache
        run: python scripts/update_cache.py

      - name: Commit cache changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/cache.json
          git diff --cached --quiet || git commit -m "Update FotMob cache"
          git push
